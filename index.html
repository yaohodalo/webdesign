<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Would You Join Me For One Hour</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- VideoJS -->
<link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

#map{
height:500px;
width:90%;
margin:auto;
margin-bottom:20px;
}
#videoContainer{
width:90%;
margin:auto;
margin-top:20px;
}

.video-modal{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background-color:rgba(0,0,0,0.9);
}

.video-modal-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:900px;
}

#adorationVideo,
#adorationFrame{
width:100%;
height:500px;
}

.closeVideo{
position:absolute;
top:-40px;
right:0;
font-size:30px;
color:white;
cursor:pointer;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#videoContainer{
margin-top:20px;
}

.scroll-text{
background:black;
color:white;
padding:10px;
font-size:18px;
width:90%;
margin:auto;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>"Could you not watch with me one hour?"</h1>
<p>Matthew 26:40</p>

<h2>Global Eucharistic Adoration</h2>

<div class="scroll-text">
<marquee behavior="scroll" direction="left" scrollamount="5">
✝ Stay With Me, Remain Here With Me ✝ Watch And Pray 
</marquee>
</div>

<div id="map"></div>

<div id="videoModal" class="video-modal">
<div class="video-modal-content">
<span class="closeVideo" onclick="closeVideo()">✖</span>
  
  
<div id="videoContainer">
<video
id="adorationVideo"
class="video-js"
controls
autoplay
style="display:none">
</video>

<iframe
id="adorationFrame"
style="display:none"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<br>

<div class="timer">
Adoration Hour Remaining: <span id="countdown">60:00</span>
</div>

<button onclick="startPrayer()">Start Prayer Hour</button>
<button onclick="stopPrayer()">Stop Prayer</button>

<p>Soul Watching in Prayer: <span id="prayerCount">0</span></p>

<p>© 2026 Worldwide Eucharistic Adoration Network</p>

<script>

/* MAP */

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


/* VIDEO PLAYER */


var player = videojs('adorationVideo');

function playChapel(stream){

document.getElementById("videoModal").style.display="block";

var video = document.getElementById("adorationVideo");
var frame = document.getElementById("adorationFrame");



/* YOUTUBE */

if(stream.includes("youtube.com") || stream.includes("youtu.be")){

video.style.display="none";
frame.style.display="block";

var id;

if(stream.includes("watch?v=")){
id = stream.split("watch?v=")[1];
}else if(stream.includes("youtu.be/")){
id = stream.split("youtu.be/")[1];
}

if(id.includes("&")){
id = id.split("&")[0];
}

frame.src="https://www.youtube.com/embed/"+id+"?autoplay=1";

}

/* M3U8 STREAM */

else if(stream.includes(".m3u8")){

frame.style.display="none";
video.style.display="block";

player.src({
src:stream,
type:"application/x-mpegURL"
});

player.play();

}

}

function closeVideo(){

document.getElementById("videoModal").style.display="none";

document.getElementById("adorationFrame").src="";

player.pause();

}


function stopPrayer(){

clearInterval(timerInterval);

alert("Prayer hour stopped. Thank you for praying.");

}

  
/* PRAYER TIMER */

var seconds=0;
var timerInterval;

function startPrayer(){

clearInterval(timerInterval);

seconds = 0;

timerInterval=setInterval(function(){

seconds++;

var minutes=Math.floor(seconds/60);
var sec=seconds%60;

document.getElementById("countdown").innerText =
minutes+":"+(sec<10?"0"+sec:sec);

if(seconds==3600){
clearInterval(timerInterval);
alert("Thank you for completing one hour of prayer!");
incrementCounter();
}

},1000);

}

function stopPrayer(){

clearInterval(timerInterval);

alert("Prayer hour stopped. Thank you for praying.");

}


/* GLOBAL COUNTER */

function incrementCounter(){

var count=parseInt(document.getElementById("prayerCount").innerText);
count++;

document.getElementById("prayerCount").innerText=count;

}


/* MAP MARKERS */

L.marker([51.088191,-114.196839]).addTo(map)
.bindPopup(`
<h3>Sisters of Divine Mercy, Calgary CA</h3>
<button onclick="playChapel('https://edge3.stl.ecatholic.live/live/ss/amlst:1_23_676_1_6iAOzF4TPNjbPTSlvM9JOb95EFZjllKJEjW3SHCZ5BF8ApsUyfOSvlmtCM70i9f9/playlist.m3u8?playerId=1&secure_token=NeyYM3e4O3hDIWhVckJdSmIhFiWD1LXx&heartbeat_token=eyJpdiI6ImhtSjhCTEN0Zm5ZTG02UWMvN0JTenc9PSIsInZhbHVlIjoialVvMEZnMFhoWWRUTkUwdEtmcFFFeUw4TFlhT1YyZ2s1YS9oeVhobmlaMmh6TmpqdldaZ0RHUmw5azVHeklsZCIsIm1hYyI6Ijk5Y2RlYjY1NjdkMTQ2NDRkNTAwOGY2MDE0YmNjYWIxZjdlZjc0YzllNjc0ZThmNWVlN2MxYTJiNWEzYzU5M2QiLCJ0YWciOiIifQ%3D%3D-1772930595')">
Watch Live Adoration
</button>
`);

L.marker([33.533602,-86.675057]).addTo(map)
.bindPopup(`
<h3>EWTN Chapel, Irondale AL, USA</h3>
<button onclick="playChapel('https://cdn3.wowza.com/1/Y09GU2RCUG9EbVRr/WlpHUVVx/hls/live/playlist.m3u8')">
Watch Live Adoration
</button>
`);

L.marker([-37.848311,145.096218]).addTo(map)
.bindPopup(`
<h3>St Benedicts Burwood, Australia</h3>
<button onclick="playChapel('https://www.youtube.com/watch?v=qz8YE61BoXM')">
Watch Live Adoration
</button>
`);

L.marker([52.202124,20.419678]).addTo(map)
.bindPopup(`
<h3>Franciscan Monastery, Paprotnia Poland</h3>
<button onclick="playChapel('https://www.youtube.com/watch?v=bIR18Pvy11U')">
Watch Live Adoration
</button>
`);

</script>

</body>
</html>
