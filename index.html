<!DOCTYPE html>
<html>

<head>

<title>Would You Join Me For One Hour?</title>

<link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Georgia, serif;
text-align:center;
background:linear-gradient(#1b1b1b,#3a2f23);
color:#f5e6c8;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
font-weight:normal;
margin-top:30px;
}

p{
font-size:18px;
}

.video-wrapper{
position:relative;
}

.scroll-text{
position:absolute;
bottom:10px;
width:100%;
white-space:nowrap;
overflow:hidden;
font-size:22px;
color:#ffd700;
text-shadow:0 0 10px rgba(255,215,0,0.7);
animation:scroll 12s linear infinite;
}

@keyframes scroll{
from{transform:translateX(100%)}
to{transform:translateX(-100%)}
}

.timer{
margin-top:15px;
font-size:20px;
color:#ffd700;
}

video{
border-radius:8px;
}

#map{
height:500px;
width:100%;
margin-top:30px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>"Could you not watch with me one hour?" — Matthew 26:40</h1>

<h2>Global Eucharistic Adoration</h2>

<div id="map"></div>

<p>Spend time with Jesus in the Blessed Sacrament.</p>

<div class="video-wrapper">

<video
id="adoration"
class="video-js"
controls
autoplay
width="900"
height="500">

<source src="https://edge3.stl.ecatholic.live/live/ss/amlst:1_23_676_1_6iAOzF4TPNjbPTSlvM9JOb95EFZjllKJEjW3SHCZ5BF8ApsUyfOSvlmtCM70i9f9/playlist.m3u8?playerId=1&secure_token=NeyYM3e4O3hDIWhVckJdSmIhFiWD1LXx&heartbeat_token=eyJpdiI6ImhtSjhCTEN0Zm5ZTG02UWMvN0JTenc9PSIsInZhbHVlIjoialVvMEZnMFhoWWRUTkUwdEtmcFFFeUw4TFlhT1YyZ2s1YS9oeVhobmlaMmh6TmpqdldaZ0RHUmw5azVHeklsZCIsIm1hYyI6Ijk5Y2RlYjY1NjdkMTQ2NDRkNTAwOGY2MDE0YmNjYWIxZjdlZjc0YzllNjc0ZThmNWVlN2MxYTJiNWEzYzU5M2QiLCJ0YWciOiIifQ%3D%3D-1772930595" type="application/x-mpegURL">

</video>

</div>

<div class="scroll-text">
Stay With Me, Remain Here With Me — Watch And Pray
</div>

<div class="timer">
Adoration Hour Remaining: <span id="countdown">60:00</span>
</div>

</div>

<script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var player = videojs('adoration');

var time = 3600;

function updateTimer(){
var minutes = Math.floor(time/60);
var seconds = time%60;

if(seconds < 10){
seconds = "0" + seconds;
}

document.getElementById("countdown").innerHTML = minutes + ":" + seconds;

if(time > 0){
time--;
}
}

setInterval(updateTimer,1000);


/* MAP */

var map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:18
}).addTo(map);

</script>

<script>
setTimeout(function(){
location.reload();
},300000);
</script>

</body>
</html>
