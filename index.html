<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Would You Join Me For One Hour</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

#map{
height:500px;
width:90%;
margin:auto;
margin-bottom:20px;
}

#videoContainer{
width:90%;
margin:auto;
margin-top:20px;
}

.video-modal{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background-color:rgba(0,0,0,0.9);
}

.video-modal-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:900px;
}

#adorationVideo,
#adorationFrame{
width:100%;
height:500px;
}

.closeVideo{
position:absolute;
top:-40px;
right:0;
font-size:30px;
color:white;
cursor:pointer;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
.scroll-text{
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://www.saintjeromechurch.org/wp-content/uploads/2024/03/22291-what-exactly-is-the-blessed-sacrament-find-out-here.jpg");
background-size:cover;
background-position:center;
color:gold;
padding:12px;
font-size:20px;
font-weight:bold;
width:90%;
margin:auto;
margin-bottom:20px;
text-shadow:2px 2px 6px black;
border:2px solid gold;
}

</style>
</head>

<body>

<h1>"Could you not watch with me one hour?"</h1>
<p>Matthew 26:40</p>

<h2>Global Eucharistic Adoration</h2>

<div class="scroll-text">
<marquee behavior="scroll" direction="left" scrollamount="5">
Stay With Me, Remain Here With Me.
Watch And Pray, Watch And Pray.
</marquee>
</div>

<div id="map"></div>

<!-- Prayer Timer Section -->
<div class="timer">
Adoration Hour Remaining: <span id="countdown">60:00</span>
</div>

<button onclick="startPrayer()">Start Prayer Hour</button>
<button onclick="stopPrayer()">Stop Prayer</button>


  
<!-- Souls praying counter -->
<p>Soul Watching in Prayer: <span id="prayerCount">0</span></p>
<p>© 2026 I Am Catholic - Global Eucharistic Adoration Map</p>


<div id="videoModal" class="video-modal">
<div class="video-modal-content">

<span class="closeVideo" onclick="closeVideo()">✖</span>

<div id="videoContainer">

<video
id="adorationVideo"
class="video-js"
controls
autoplay
style="display:none">
</video>

<iframe
id="adorationFrame"
style="display:none"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<br>
  
</div>

<script>

/* MAP */

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


/* VIDEO PLAYER */

var player = videojs('adorationVideo');

function playChapel(stream){

document.getElementById("videoModal").style.display="block";

var video=document.getElementById("adorationVideo");
var frame=document.getElementById("adorationFrame");

if(stream.includes("youtube.com") || stream.includes("youtu.be")){

video.style.display="none";
frame.style.display="block";

var id;

if(stream.includes("watch?v=")){
id=stream.split("watch?v=")[1];
}else{
id=stream.split("youtu.be/")[1];
}

if(id.includes("&")){
id=id.split("&")[0];
}

frame.src="https://www.youtube.com/embed/"+id+"?autoplay=1";

}

else if(stream.includes(".m3u8")){

frame.style.display="none";
video.style.display="block";

player.src({
src:stream,
type:"application/x-mpegURL"
});

player.play();

}

/* NEW: WEBCAM PAGE */

else{

video.style.display="none";
frame.style.display="block";

frame.src = stream;

}

}

function closeVideo(){

document.getElementById("videoModal").style.display="none";
document.getElementById("adorationFrame").src="";
player.pause();

}

/* CLOSE MODAL CLICK OUTSIDE */

window.onclick=function(event){

var modal=document.getElementById("videoModal");

if(event.target==modal){
closeVideo();
}

}

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyBB6NJuODwMOE5uyswtCR9PCAc3-Dr4D50",
authDomain:"apostolate-4d47c.firebaseapp.com",
databaseURL:"https://apostolate-4d47c-default-rtdb.firebaseio.com",
projectId:"apostolate-4d47c"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* GLOBAL COUNTER */

db.ref("souls").on("value",(snapshot)=>{
document.getElementById("prayerCount").innerText=snapshot.val() || 0;
});

/* PRAYER TIMER */

var praying=false;
var seconds=3600;
var timerInterval;

function startPrayer(){

if(praying) return;

praying=true;

clearInterval(timerInterval);

seconds=3600;

db.ref("souls").transaction((current)=>{
return (current || 0)+1;
});

timerInterval=setInterval(function(){

seconds--;

var minutes=Math.floor(seconds/60);
var sec=seconds%60;

document.getElementById("countdown").innerText=
minutes+":"+(sec<10?"0"+sec:sec);

if(seconds<=0){

clearInterval(timerInterval);

alert("Thank you for completing one hour of prayer!");

stopPrayer();

}

},1000);

}

function stopPrayer(){

if(!praying) return;

praying=false;

clearInterval(timerInterval);

db.ref("souls").transaction((current)=>{
return Math.max((current || 1)-1,0);
});

alert("Prayer hour stopped. Thank you for praying.");

document.getElementById("countdown").innerText="60:00";

}

/* SAFELY REMOVE COUNT ON PAGE EXIT */

window.addEventListener("beforeunload",function(){

if(praying){

db.ref("souls").transaction((current)=>{
return Math.max((current || 1)-1,0);
});

}

});

/* MAP MARKERS */

L.marker([51.088191,-114.196839]).addTo(map)
.bindPopup(`
<h3>Sisters of Divine Mercy, Calgary CA</h3>
<button onclick="playChapel('https://www.youtube.com/watch?v=1OR9c5YtRco')">
Watch Live Adoration
</button>
`);

.bindPopup(`

Watch Live Adoration
</button>
`);

</script>
