<!DOCTYPE html>
<html>

<head>

<title>Global Eucharistic Adoration</title>

<link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Georgia, serif;
text-align:center;
background:linear-gradient(#1b1b1b,#3a2f23);
color:#f5e6c8;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

#map{
height:500px;
width:100%;
margin-top:30px;
border-radius:8px;
}

.video-wrapper{
margin-top:20px;
}

button{
background:gold;
border:none;
padding:12px;
font-size:16px;
cursor:pointer;
border-radius:6px;
margin-top:10px;
}

.timer{
margin-top:15px;
font-size:20px;
color:#ffd700;
}

</style>

</head>

<body>

<div class="container">

<h1>"Could you not watch with me one hour?" Matthew 26:40</h1>

<h2>Global Eucharistic Adoration</h2>

<p> Souls Watching in Prayer: <span id="prayerCount">0</span></p>

<button id="prayerButton" onclick="joinPrayer()">
I Will Watch One Hour
</button>

<div id="map"></div>

<div class="video-wrapper">

<video
id="adoration"
class="video-js"
controls
autoplay
width="900"
height="500">

<source src="https://edge3.stl.ecatholic.live/live/ss/amlst:1_23_676_1_6iAOzF4TPNjbPTSlvM9JOb95EFZjllKJEjW3SHCZ5BF8ApsUyfOSvlmtCM70i9f9/playlist.m3u8"
type="application/x-mpegURL">

</video>

</div>

<div class="timer">
Adoration Hour Remaining: <span id="countdown">60:00</span>
</div>

</div>

<script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* VIDEO PLAYER */

var player = videojs('adoration');


/* PRAYER COUNTER */

var prayers = 0;

function joinPrayer(){

prayers++;

document.getElementById("prayerCount").innerText = prayers;

var btn = document.getElementById("prayerButton");

btn.disabled = true;
btn.innerText = "You are praying with us";

}


/* ONE HOUR TIMER */

var time = 3600;

function updateTimer(){

var minutes = Math.floor(time/60);
var seconds = time % 60;

if(seconds < 10){
seconds = "0"+seconds;
}

document.getElementById("countdown").innerHTML =
minutes + ":" + seconds;

if(time > 0){
time--;
}

}

setInterval(updateTimer,1000);


/* MAP */

var map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:18
}).addTo(map);


/* FUNCTION TO CHANGE STREAM */

function playChapel(stream){

player.src({
src: stream,
type: "application/x-mpegURL"
});

player.play();

}


/* MAP MARKERS */

L.marker([51.08819145733045, -114.19683910285558]).addTo(map)
.bindPopup(`
<h3>Sisters of Divine Mercy, Calgary CA</h3>
<button onclick="playChapel('https://edge3.stl.ecatholic.live/live/ss/amlst:1_23_676_1_6iAOzF4TPNjbPTSlvM9JOb95EFZjllKJEjW3SHCZ5BF8ApsUyfOSvlmtCM70i9f9/playlist.m3u8?playerId=1&secure_token=NeyYM3e4O3hDIWhVckJdSmIhFiWD1LXx&heartbeat_token=eyJpdiI6ImhtSjhCTEN0Zm5ZTG02UWMvN0JTenc9PSIsInZhbHVlIjoialVvMEZnMFhoWWRUTkUwdEtmcFFFeUw4TFlhT1YyZ2s1YS9oeVhobmlaMmh6TmpqdldaZ0RHUmw5azVHeklsZCIsIm1hYyI6Ijk5Y2RlYjY1NjdkMTQ2NDRkNTAwOGY2MDE0YmNjYWIxZjdlZjc0YzllNjc0ZThmNWVlN2MxYTJiNWEzYzU5M2QiLCJ0YWciOiIifQ%3D%3D-1772930595')">
Watch Live Adoration
</button>
`);

</script>

</body>
</html>
