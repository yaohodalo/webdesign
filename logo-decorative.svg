<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Would You Join Me for One Hour">
  <defs>
    <linearGradient id="goldGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e6c065"/>
      <stop offset="40%"  stop-color="#d4a83a"/>
      <stop offset="100%" stop-color="#7a5f1f"/>
    </linearGradient>
    <radialGradient id="hostGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff8e1" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#fff8e1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff8e1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══ DECORATIVE MONSTRANCE WITH SUNBURST ═══ -->
  <g transform="translate(200, 80)">
    <!-- Outer aura glow -->
    <circle cx="0" cy="0" r="70" fill="url(#hostGlow)"/>

    <!-- Long primary rays (16 total) -->
    <g fill="url(#goldGradient2)">
      <g transform="rotate(0)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(22.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(45)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(67.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(90)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(112.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(135)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(157.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(180)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(202.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(225)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(247.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(270)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(292.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
      <g transform="rotate(315)"><path d="M0 -28 L2 -55 L0 -62 L-2 -55 Z"/></g>
      <g transform="rotate(337.5)"><path d="M0 -28 L1.5 -48 L0 -54 L-1.5 -48 Z" opacity="0.85"/></g>
    </g>

    <!-- Outer ornate ring -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="url(#goldGradient2)" stroke-width="2.5"/>
    <!-- Inner decorative ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#goldGradient2)" stroke-width="0.5" opacity="0.7"/>
    <!-- Small gems around the ring -->
    <g fill="#d4a83a">
      <circle cx="0" cy="-24" r="1.2"/>
      <circle cx="17" cy="-17" r="1.2"/>
      <circle cx="24" cy="0" r="1.2"/>
      <circle cx="17" cy="17" r="1.2"/>
      <circle cx="0" cy="24" r="1.2"/>
      <circle cx="-17" cy="17" r="1.2"/>
      <circle cx="-24" cy="0" r="1.2"/>
      <circle cx="-17" cy="-17" r="1.2"/>
    </g>

    <!-- Host (white center) -->
    <circle cx="0" cy="0" r="18" fill="#ffffff"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#goldGradient2)" stroke-width="0.5" opacity="0.5"/>

    <!-- ═══ IHS Christogram on host ═══ -->
    <g fill="#7a5f1f">
      <!-- I, H, S in Trajan-style Roman capitals -->
      <text x="0" y="3"
            text-anchor="middle"
            font-family="'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
            font-size="11"
            font-weight="700"
            letter-spacing="0.04em">IHS</text>

      <!-- Small cross rising from top of H -->
      <g transform="translate(0, -6.5)">
        <rect x="-0.4" y="-3" width="0.8" height="3.2"/>
        <rect x="-1.4" y="-2" width="2.8" height="0.7"/>
      </g>

      <!-- Three nails beneath IHS (classic Jesuit emblem) -->
      <g transform="translate(0, 8)" opacity="0.85">
        <path d="M-2.3 0 L-2.3 2.5 L-2.0 3 L-1.7 2.5 L-1.7 0 Z"/>
        <circle cx="-2" cy="-0.3" r="0.6"/>
        <path d="M-0.3 0 L-0.3 2.5 L0 3 L0.3 2.5 L0.3 0 Z"/>
        <circle cx="0" cy="-0.3" r="0.6"/>
        <path d="M1.7 0 L1.7 2.5 L2.0 3 L2.3 2.5 L2.3 0 Z"/>
        <circle cx="2" cy="-0.3" r="0.6"/>
      </g>
    </g>

    <!-- Stem and base -->
    <rect x="-2" y="28" width="4" height="20" fill="url(#goldGradient2)"/>
    <ellipse cx="0" cy="38" rx="5" ry="2.5" fill="url(#goldGradient2)"/>
    <ellipse cx="0" cy="38" rx="4" ry="1.5" fill="#d4a83a" opacity="0.7"/>
    <path d="M-14 60 L14 60 L9 48 L-9 48 Z" fill="url(#goldGradient2)"/>
    <path d="M-16 64 L16 64 L13 60 L-13 60 Z" fill="url(#goldGradient2)"/>
  </g>

  <!-- ═══ SITE NAME (below) ═══ -->
  <g fill="#25262a" font-family="'Cormorant Garamond', Garamond, serif" text-anchor="middle">
    <text x="200" y="180" font-size="14" font-style="italic" font-weight="400" letter-spacing="0.08em">
      Would You Join Me
    </text>
    <text x="200" y="210" font-size="30" font-style="italic" font-weight="500" letter-spacing="0.01em">
      for One Hour?
    </text>
  </g>

  <!-- ═══ Fleuron underneath ═══ -->
  <g transform="translate(200, 226)" fill="#b8923a" opacity="0.7">
    <path d="M0 -4 C -2 0, -5 1, -8 1 C -5 1, -2 2, 0 4 C 2 2, 5 1, 8 1 C 5 1, 2 0, 0 -4 Z"/>
    <line x1="-70" y1="0" x2="-12" y2="0" stroke="#b8923a" stroke-width="0.5" opacity="0.5"/>
    <line x1="12" y1="0" x2="70" y2="0" stroke="#b8923a" stroke-width="0.5" opacity="0.5"/>
    <circle cx="-74" cy="0" r="1"/>
    <circle cx="74" cy="0" r="1"/>
  </g>
</svg>
