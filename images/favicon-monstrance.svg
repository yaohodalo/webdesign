<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Solid gold, no gradients — reads crisp at every size including 16x16 -->
  <g fill="#c8961e">
    <!-- 8 bold sunburst rays, 45deg apart. Wider at base, sharp tips — reads as a burst -->
    <!-- top -->
    <path d="M32 2 L36 22 L28 22 Z"/>
    <!-- top-right -->
    <path d="M53.2 10.8 L41 27 L37 23 Z"/>
    <!-- right -->
    <path d="M62 32 L42 36 L42 28 Z"/>
    <!-- bottom-right -->
    <path d="M53.2 53.2 L37 41 L41 37 Z"/>
    <!-- bottom -->
    <path d="M32 62 L28 42 L36 42 Z"/>
    <!-- bottom-left -->
    <path d="M10.8 53.2 L23 37 L27 41 Z"/>
    <!-- left -->
    <path d="M2 32 L22 28 L22 36 Z"/>
    <!-- top-left -->
    <path d="M10.8 10.8 L27 23 L23 27 Z"/>

    <!-- The lunette ring (monstrance housing the host) - one solid disc -->
    <circle cx="32" cy="32" r="14"/>
  </g>

  <!-- The Host (consecrated bread) — solid white circle, the calm center -->
  <circle cx="32" cy="32" r="9" fill="#fff8e1"/>
</svg>
