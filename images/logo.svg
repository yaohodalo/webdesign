<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" role="img" aria-label="Would You Join Me for One Hour">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d4a83a"/>
      <stop offset="50%"  stop-color="#b8923a"/>
      <stop offset="100%" stop-color="#7a5f1f"/>
    </linearGradient>
  </defs>

  <!-- ═══ Monstrance with IHS host (top center) ═══ -->
  <g transform="translate(160, 8)">
    <!-- Sunburst rays around the host -->
    <g fill="url(#goldGradient)" opacity="0.85">
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(0)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(30)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(60)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(90)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(120)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(150)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(180)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(210)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(240)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(270)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(300)"/>
      <path d="M0 0 L1.5 -10 L0 -14 L-1.5 -10 Z" transform="rotate(330)"/>
    </g>
    <!-- Luna/host ring -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#ffffff"/>
    <!-- IHS centered on host -->
    <text x="0" y="1.8"
          text-anchor="middle"
          font-family="'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
          font-size="4.2"
          font-weight="700"
          letter-spacing="0.04em"
          fill="#7a5f1f">IHS</text>
    <!-- Stem -->
    <rect x="-0.8" y="14" width="1.6" height="14" fill="url(#goldGradient)"/>
    <!-- Node on stem -->
    <ellipse cx="0" cy="18" rx="2.5" ry="1" fill="url(#goldGradient)"/>
    <!-- Base -->
    <path d="M-6 28 L6 28 L4 24 L-4 24 Z" fill="url(#goldGradient)"/>
    <path d="M-7 30 L7 30 L5 27 L-5 27 Z" fill="url(#goldGradient)" opacity="0.7"/>
  </g>

  <!-- ═══ Site name (typographic) ═══ -->
  <g fill="#25262a" font-family="'Cormorant Garamond', Garamond, serif" text-anchor="middle">
    <text x="160" y="74" font-size="14" font-style="italic" font-weight="400" letter-spacing="0.04em">
      Would You Join Me
    </text>
    <text x="160" y="104" font-size="26" font-style="italic" font-weight="500" letter-spacing="0.01em">
      for One Hour?
    </text>
  </g>

  <!-- ═══ Fleuron beneath ═══ -->
  <g transform="translate(160, 122)" fill="#b8923a" opacity="0.75">
    <path d="M0 -4 C -2 0, -5 1, -8 1 C -5 1, -2 2, 0 4 C 2 2, 5 1, 8 1 C 5 1, 2 0, 0 -4 Z"/>
    <line x1="-50" y1="0" x2="-12" y2="0" stroke="#b8923a" stroke-width="0.4" opacity="0.6"/>
    <line x1="12" y1="0" x2="50" y2="0" stroke="#b8923a" stroke-width="0.4" opacity="0.6"/>
    <circle cx="-54" cy="0" r="0.8"/>
    <circle cx="54" cy="0" r="0.8"/>
  </g>
</svg>
